<script>
// ── Defaults ──────────────────────────────────────────────────
const DEF = {
  mmol: { icr:'12', isf:'2.5', target:'5.5' },
  mgdl: { icr:'12', isf:'45',  target:'99'  },
};
let unit = 'mmol';

// ── Unit switching ────────────────────────────────────────────
function setUnit(u) {
  const gEl   = document.getElementById('glucose');
  const isfEl = document.getElementById('isf');
  const tEl   = document.getElementById('target');
  const gv    = parseDecimal(gEl.value);
  const isfv  = parseDecimal(isfEl.value);
  const tv    = parseDecimal(tEl.value);
  unit = u;

  document.getElementById('btn-mmol').classList.toggle('active', u === 'mmol');
  document.getElementById('btn-mgdl').classList.toggle('active', u === 'mgdl');
  document.getElementById('glucose-unit-label').textContent = t(u === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  document.getElementById('target-unit-label').textContent  = t(u === 'mmol' ? 'unit_mmol' : 'unit_mgdl');

  const isfHintKey = u === 'mmol' ? 'hint_isf_mmol' : 'hint_isf_mgdl';
  const isfHintEl  = document.getElementById('isf-hint');
  if (isfHintEl) { isfHintEl.dataset.i18n = isfHintKey; isfHintEl.textContent = t(isfHintKey); }
  // #target-hint element removed — unit label in input-unit span is sufficient

  updatePlaceholders(u);

  if (u === 'mgdl') {
    if (!isNaN(gv)   && gv > 0)   gEl.value   = String(Math.round(gv * 18.016));
    if (!isNaN(isfv) && isfv > 0)  isfEl.value = String(Math.round(isfv * 18.016));
    if (!isNaN(tv)   && tv > 0)    tEl.value   = String(Math.round(tv * 18.016));
  } else {
    if (!isNaN(gv)   && gv > 0)   gEl.value   = (gv / 18.016).toFixed(1);
    if (!isNaN(isfv) && isfv > 0)  isfEl.value = (isfv / 18.016).toFixed(1);
    if (!isNaN(tv)   && tv > 0)    tEl.value   = (tv / 18.016).toFixed(1);
  }

  clearAllErrors();
  hideResult();
  onGlucoseInput();
}

function updatePlaceholders(u) {
  const isU = u || unit;
  document.getElementById('glucose').placeholder = t(isU === 'mmol' ? 'ph_glucose_mmol' : 'ph_glucose_mgdl');
  document.getElementById('target').placeholder  = t(isU === 'mmol' ? 'ph_target_mmol'  : 'ph_target_mgdl');
  document.getElementById('isf').placeholder     = t(isU === 'mmol' ? 'ph_isf_mmol'     : 'ph_isf_mgdl');
  document.getElementById('carbs').placeholder   = t('ph_carbs');
  document.getElementById('icr').placeholder     = t('ph_icr');
}

// ── Glucose indicator ─────────────────────────────────────────
function getGlucoseLevel(mmol) {
  if (mmol < 3.9)  return { label:'LOW',       cls:'level-low',       color:'#2e9e78' };
  if (mmol <= 7.8) return { label:'OK',         cls:'level-ok',        color:'#1f9b72' };
  if (mmol <= 11)  return { label:'HIGH',       cls:'level-high',      color:'#c47c10' };
  return                  { label:'VERY HIGH',  cls:'level-very-high', color:'#c0392b' };
}

function onCarbsInput() {
  // Clear active preset if user manually edits carbs field
  const val = document.getElementById('carbs').value.trim();
  const presets = loadPresets();
  const matched = presets.some(p => String(p.carbs) === val);
  if (!matched) {
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('preset-chip-active'));
  }
}

function onGlucoseInput() {
  const val   = parseDecimal(document.getElementById('glucose').value);
  const badge = document.getElementById('glucose-badge');
  const zone  = document.getElementById('glucose-zone');
  if (isNaN(val) || val <= 0) { badge.innerHTML = ''; zone.style.background = 'transparent'; return; }
  const lv = getGlucoseLevel(unit === 'mgdl' ? val / 18.016 : val);
  badge.innerHTML = `<span class="level-badge ${lv.cls}">${lv.label}</span>`;
  zone.style.background = lv.color;
}

// ── Validation ────────────────────────────────────────────────
function validateField(inputId, groupId) {
  const el  = document.getElementById(inputId);
  const grp = document.getElementById(groupId);
  el.classList.remove('input-error');
  if (grp) grp.querySelectorAll('.field-error').forEach(e => e.remove());
  const raw = el.value.trim();
  if (!raw)               { showErr(el, grp, t('err_required')); return false; }
  const val = parseDecimal(raw);
  if (isNaN(val))         { showErr(el, grp, t('err_invalid'));  return false; }
  if (val <= 0)           { showErr(el, grp, t('err_zero'));     return false; }
  return true;
}

function showErr(el, grp, msg) {
  el.classList.add('input-error');
  const err = document.createElement('div');
  err.className = 'field-error';
  err.textContent = msg;
  if (grp) { grp.appendChild(err); } else { el.after(err); }
}

function onEnterKey(e) { if (e.key === 'Enter') { e.preventDefault(); calculate(); } }

// ── Calculate ─────────────────────────────────────────────────
function calculate() {
  const valid = [
    validateField('glucose','grp-glucose'),
    validateField('carbs',  'grp-carbs'),
    validateField('target', 'grp-target'),
    validateField('icr',    'grp-icr'),
    validateField('isf',    'grp-isf'),
  ];
  if (valid.includes(false)) {
    const first = document.querySelector('.input-error');
    if (first) first.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  const glucoseRaw = parseDecimal(document.getElementById('glucose').value);
  const carbsG     = parseDecimal(document.getElementById('carbs').value);
  const icr        = parseDecimal(document.getElementById('icr').value);
  const isfRaw     = parseDecimal(document.getElementById('isf').value);
  const targetRaw  = parseDecimal(document.getElementById('target').value);

  const toM      = v => unit === 'mgdl' ? v / 18.016 : v;
  const glucose  = toM(glucoseRaw), isf = toM(isfRaw), tgt = toM(targetRaw);
  const carbDose = carbsG / icr;
  const corrDose = (glucose - tgt) / isf;
  const total    = carbDose + corrDose;

  const dUnit = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  const fmtG  = v => v.toFixed(unit === 'mmol' ? 1 : 0);
  const now   = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const content = document.getElementById('result-content');

  if (total <= 0) {
    content.innerHTML = `
      <div class="no-dose">${glucose < 3.9 ? t('no_dose_hypo') : t('no_dose_zero')}</div>
      <div class="result-breakdown">
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_carbs')} (${carbsG}g ÷ ${icr})</span><span class="breakdown-val">${carbDose.toFixed(2)} u.</span></div>
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_corr')} (${fmtG(glucoseRaw)} → ${fmtG(targetRaw)} ${dUnit})</span><span class="breakdown-val negative">${corrDose.toFixed(2)} u.</span></div>
      </div>`;
    saveHistory(glucoseRaw, carbsG, 0, now);
  } else {
    const rounded = Math.round(total * 2) / 2;
    content.innerHTML = `
      <div class="result-main">
        <div class="result-label">${t('result_label')}</div>
        <div class="result-value">${rounded.toFixed(1)}</div>
        <div class="result-unit">${t('result_unit')}</div>
        <div class="result-time">${now}</div>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_carbs')} (${carbsG}g ÷ ${icr})</span><span class="breakdown-val">${carbDose.toFixed(2)} u.</span></div>
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_corr')} (${fmtG(glucoseRaw)} → ${fmtG(targetRaw)} ${dUnit})</span><span class="breakdown-val ${corrDose>=0?'positive':'negative'}">${corrDose>=0?'+':''}${corrDose.toFixed(2)} u.</span></div>
        <div class="breakdown-divider"></div>
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_exact')}</span><span class="breakdown-val">${total.toFixed(2)} u.</span></div>
        <div class="breakdown-row"><span class="breakdown-name">${t('breakdown_round')}</span><span class="breakdown-val" style="color:var(--accent2)">${rounded.toFixed(1)} u.</span></div>
      </div>`;
    saveHistory(glucoseRaw, carbsG, rounded, now);
  }

  document.getElementById('result-card').classList.add('visible');
  setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
}

function hideResult() { document.getElementById('result-card').classList.remove('visible'); }

// ── Reset ─────────────────────────────────────────────────────
function resetAll() {
  ['glucose','carbs','target','icr','isf'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('glucose-badge').innerHTML = '';
  document.getElementById('glucose-zone').style.background = 'transparent';
  document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('preset-chip-active'));
  clearAllErrors();
  hideResult();
}

// ── History ───────────────────────────────────────────────────
function loadHistory() { try { return JSON.parse(localStorage.getItem('insulin_history')||'[]'); } catch { return []; } }

function saveHistory(glucose, carbs, dose, time) {
  const h = loadHistory();
  h.unshift({ glucose, carbs, dose, time, unit, date: new Date().toLocaleDateString() });
  if (h.length > 20) h.length = 20;
  localStorage.setItem('insulin_history', JSON.stringify(h));
  renderHistory(); updateHistoryLabel();
}

function renderHistory() {
  const h    = loadHistory();
  const list = document.getElementById('history-list');
  if (!h.length) { list.innerHTML = `<div class="history-empty">${t('history_empty')}</div>`; return; }
  list.innerHTML = h.map(e => `
    <div class="history-item">
      <div class="history-item-left">
        <div>${e.date} ${e.time}</div>
        <div>🩸 ${e.glucose} ${e.unit==='mmol'?'mmol/L':'mg/dL'} &nbsp;🥗 ${e.carbs}g</div>
      </div>
      <div class="history-item-dose">${e.dose>0?e.dose.toFixed(1)+' u.':'—'}</div>
    </div>`).join('');
}

function clearHistory() {
  if (!confirm(t('confirm_history'))) return;
  localStorage.removeItem('insulin_history'); renderHistory(); updateHistoryLabel();
}

function updateHistoryLabel() {
  const h = loadHistory();
  const l = document.getElementById('history-toggle-label');
  if (l) l.textContent = h.length ? `${t('btn_history')} (${h.length})` : t('btn_history');
}

let historyOpen = false;
function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('history-panel').classList.toggle('visible', historyOpen);
  if (historyOpen) { renderHistory(); setTimeout(() => document.getElementById('history-panel').scrollIntoView({ behavior:'smooth', block:'nearest' }), 60); }
}

// ── Presets ───────────────────────────────────────────────────
function getDefaultPresets() {
  return [
    { id:'p1', name: t('preset_breakfast'), carbs:45 },
    { id:'p2', name: t('preset_lunch'),     carbs:70 },
    { id:'p3', name: t('preset_dinner'),    carbs:55 },
  ];
}
function loadPresets() {
  try { return JSON.parse(localStorage.getItem('meal_presets') || 'null') || getDefaultPresets(); }
  catch { return getDefaultPresets(); }
}
function savePresetsData(p) { localStorage.setItem('meal_presets', JSON.stringify(p)); }

function renderPresets() {
  const presets   = loadPresets();
  const container = document.getElementById('preset-chips');
  container.innerHTML = '';
  presets.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.innerHTML = `${p.name} <span class="preset-chip-val">${p.carbs}г</span>`;
    chip.addEventListener('click', () => applyPreset(p));
    chip.addEventListener('pointerdown', startLongPress(p));
    chip.addEventListener('pointerup',   cancelLongPress);
    chip.addEventListener('pointerleave',cancelLongPress);
    container.appendChild(chip);
  });
}

let longPressTimer = null;
function startLongPress(preset) {
  return () => { longPressTimer = setTimeout(() => openPresetModal(preset), 600); };
}
function cancelLongPress() { clearTimeout(longPressTimer); }

function applyPreset(preset) {
  clearTimeout(longPressTimer);
  document.getElementById('carbs').value = String(preset.carbs);
  clearFieldError(document.getElementById('carbs'));
  // Mark active chip
  document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('preset-chip-active'));
  const chips = document.querySelectorAll('.preset-chip');
  const presets = loadPresets();
  chips.forEach((chip, i) => {
    if (presets[i] && presets[i].id === preset.id) chip.classList.add('preset-chip-active');
  });
}

let editingPresetId = null;
function openPresetModal(preset) {
  editingPresetId = preset ? preset.id : null;
  document.getElementById('preset-name').value      = preset ? preset.name        : '';
  document.getElementById('preset-carbs-val').value = preset ? String(preset.carbs) : '';
  document.getElementById('preset-delete-btn').style.display = preset ? 'block' : 'none';
  document.getElementById('preset-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('preset-name').focus(), 100);
}
function closePresetModal() { document.getElementById('preset-modal').classList.add('hidden'); }

function savePreset() {
  const name  = document.getElementById('preset-name').value.trim();
  const carbs = parseDecimal(document.getElementById('preset-carbs-val').value);
  if (!name || isNaN(carbs) || carbs <= 0) return;
  const presets = loadPresets();
  if (editingPresetId) {
    const idx = presets.findIndex(p => p.id === editingPresetId);
    if (idx !== -1) { presets[idx].name = name; presets[idx].carbs = carbs; }
  } else {
    presets.push({ id:'p' + Date.now(), name, carbs });
  }
  savePresetsData(presets);
  renderPresets();
  closePresetModal();
}

function deletePreset() {
  if (!editingPresetId) return;
  savePresetsData(loadPresets().filter(p => p.id !== editingPresetId));
  renderPresets();
  closePresetModal();
}

// Close modals on backdrop click
document.getElementById('preset-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePresetModal();
});

// ── Lang change ───────────────────────────────────────────────
document.addEventListener('langchange', () => {
  updateHistoryLabel();
  updatePlaceholders(unit);
  document.getElementById('glucose-unit-label').textContent = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  document.getElementById('target-unit-label').textContent  = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  renderPresets();
});

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateHistoryLabel();
  updatePlaceholders('mmol');
  renderPresets();
  const urlLang = new URLSearchParams(location.search).get('lang');
  if (urlLang && LANGS[urlLang]) applyLang(urlLang);
});
</script>
