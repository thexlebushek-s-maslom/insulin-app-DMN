<script>
// ── Unit state ────────────────────────────────────────────────
const DEFAULTS = { icr: '12', isf_mmol: '2.5', isf_mgdl: '45', target_mmol: '5.5', target_mgdl: '99' };
let unit = 'mmol';

function setUnit(u) {
  const gEl  = document.getElementById('glucose');
  const isfEl = document.getElementById('isf');
  const tEl  = document.getElementById('target');
  const gv   = parseDecimal(gEl.value);
  const isfv = parseDecimal(isfEl.value);
  const tv   = parseDecimal(tEl.value);
  unit = u;

  document.getElementById('btn-mmol').classList.toggle('active', u === 'mmol');
  document.getElementById('btn-mgdl').classList.toggle('active', u === 'mgdl');
  document.getElementById('glucose-unit-label').textContent = t(u === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  document.getElementById('target-unit-label').textContent  = t(u === 'mmol' ? 'unit_mmol' : 'unit_mgdl');

  // Update hints via data-i18n
  document.getElementById('isf-hint').dataset.i18n    = u === 'mmol' ? 'hint_isf_mmol'    : 'hint_isf_mgdl';
  document.getElementById('target-hint').dataset.i18n = u === 'mmol' ? 'hint_target_mmol' : 'hint_target_mgdl';
  document.getElementById('isf-hint').textContent    = t(document.getElementById('isf-hint').dataset.i18n);
  document.getElementById('target-hint').textContent = t(document.getElementById('target-hint').dataset.i18n);

  // Update placeholders
  gEl.placeholder  = t(u === 'mmol' ? 'ph_glucose_mmol' : 'ph_glucose_mgdl');
  isfEl.placeholder = t(u === 'mmol' ? 'ph_isf_mmol'    : 'ph_isf_mgdl');
  tEl.placeholder   = t(u === 'mmol' ? 'ph_target_mmol' : 'ph_target_mgdl');

  // Convert values if they were filled
  if (u === 'mgdl') {
    if (!isNaN(gv)   && gv > 0)   gEl.value   = String(Math.round(gv * 18.016));
    if (!isNaN(isfv) && isfv > 0)  isfEl.value = String(Math.round(isfv * 18.016));
    if (!isNaN(tv)   && tv > 0)    tEl.value   = String(Math.round(tv * 18.016));
  } else {
    if (!isNaN(gv)   && gv > 0)   gEl.value   = (gv / 18.016).toFixed(1);
    if (!isNaN(isfv) && isfv > 0)  isfEl.value = (isfv / 18.016).toFixed(1);
    if (!isNaN(tv)   && tv > 0)    tEl.value   = (tv / 18.016).toFixed(1);
  }

  clearAllErrors();
  hideResult();
  onGlucoseInput();
}

function toMmol(v) { return unit === 'mgdl' ? v / 18.016 : v; }

// ── Glucose level indicator ───────────────────────────────────
function getGlucoseLevel(mmol) {
  if (mmol < 3.9)  return { label: 'LOW',        cls: 'level-low',        color: '#2e9e78' };
  if (mmol <= 7.8) return { label: 'OK',          cls: 'level-ok',         color: '#1f9b72' };
  if (mmol <= 11)  return { label: 'HIGH',        cls: 'level-high',       color: '#c47c10' };
  return                  { label: 'VERY HIGH',   cls: 'level-very-high',  color: '#c0392b' };
}

function onGlucoseInput() {
  const val   = parseDecimal(document.getElementById('glucose').value);
  const badge = document.getElementById('glucose-badge');
  const zone  = document.getElementById('glucose-zone');
  if (isNaN(val) || val <= 0) {
    badge.innerHTML = '';
    zone.style.background = 'transparent';
    return;
  }
  const lv = getGlucoseLevel(toMmol(val));
  badge.innerHTML = `<span class="level-badge ${lv.cls}">${lv.label}</span>`;
  zone.style.background = lv.color;
}

// ── Validation ────────────────────────────────────────────────
function validateField(id, containerId) {
  const el = document.getElementById(id);
  const container = document.getElementById(containerId);
  const raw = el.value.trim();

  // Clear previous error
  el.classList.remove('input-error');
  container.querySelectorAll('.field-error').forEach(e => e.remove());

  if (!raw) {
    showFieldError(el, container, t('err_required'));
    return false;
  }
  const val = parseDecimal(raw);
  if (isNaN(val)) {
    showFieldError(el, container, t('err_invalid'));
    return false;
  }
  if (val <= 0) {
    showFieldError(el, container, t('err_zero'));
    return false;
  }
  return true;
}

function showFieldError(inputEl, containerEl, msg) {
  inputEl.classList.add('input-error');
  const err = document.createElement('div');
  err.className = 'field-error';
  err.textContent = msg;
  // Insert after the input-wrap or input
  const wrap = inputEl.closest('.input-wrap') || inputEl;
  wrap.after(err);
}

// ── Enter key ─────────────────────────────────────────────────
function onEnterKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); calculate(); }
}

// ── Calculate ─────────────────────────────────────────────────
function calculate() {
  // Validate all fields
  const ok = [
    validateField('glucose', 'grp-glucose'),
    validateField('carbs',   'grp-carbs'),
    validateField('target',  'grp-target'),
    validateField('icr',     'grp-icr'),
    validateField('isf',     'grp-isf'),
  ];
  if (ok.includes(false)) {
    // Scroll to first error
    const firstErr = document.querySelector('.input-error');
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const glucoseRaw = parseDecimal(document.getElementById('glucose').value);
  const carbsG     = parseDecimal(document.getElementById('carbs').value);
  const icr        = parseDecimal(document.getElementById('icr').value);
  const isfRaw     = parseDecimal(document.getElementById('isf').value);
  const targetRaw  = parseDecimal(document.getElementById('target').value);

  const glucose  = toMmol(glucoseRaw);
  const isf      = toMmol(isfRaw);
  const tgt      = toMmol(targetRaw);
  const carbDose = carbsG / icr;
  const corrDose = (glucose - tgt) / isf;
  const total    = carbDose + corrDose;

  const dUnit = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  const fmtG  = v => v.toFixed(unit === 'mmol' ? 1 : 0);
  const now   = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const content = document.getElementById('result-content');

  if (total <= 0) {
    const msg = glucose < 3.9 ? t('no_dose_hypo') : t('no_dose_zero');
    content.innerHTML = `
      <div class="no-dose">${msg}</div>
      <div class="result-breakdown">
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_carbs')} (${carbsG}g ÷ ${icr})</span>
          <span class="breakdown-val">${carbDose.toFixed(2)} u.</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_corr')} (${fmtG(glucoseRaw)} → ${fmtG(targetRaw)} ${dUnit})</span>
          <span class="breakdown-val negative">${corrDose.toFixed(2)} u.</span>
        </div>
      </div>`;
    saveHistory(glucoseRaw, carbsG, 0, now);
  } else {
    const rounded = Math.round(total * 2) / 2;
    content.innerHTML = `
      <div class="result-main">
        <div class="result-label">${t('result_label')}</div>
        <div class="result-value">${rounded.toFixed(1)}</div>
        <div class="result-unit">${t('result_unit')}</div>
        <div class="result-time">${now}</div>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_carbs')} (${carbsG}g ÷ ${icr})</span>
          <span class="breakdown-val">${carbDose.toFixed(2)} u.</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_corr')} (${fmtG(glucoseRaw)} → ${fmtG(targetRaw)} ${dUnit})</span>
          <span class="breakdown-val ${corrDose >= 0 ? 'positive' : 'negative'}">${corrDose >= 0 ? '+' : ''}${corrDose.toFixed(2)} u.</span>
        </div>
        <div class="breakdown-divider"></div>
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_exact')}</span>
          <span class="breakdown-val">${total.toFixed(2)} u.</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-name">${t('breakdown_round')}</span>
          <span class="breakdown-val" style="color:var(--accent2)">${rounded.toFixed(1)} u.</span>
        </div>
      </div>`;
    saveHistory(glucoseRaw, carbsG, rounded, now);
  }

  document.getElementById('result-card').classList.add('visible');
  setTimeout(() => document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
}

function hideResult() { document.getElementById('result-card').classList.remove('visible'); }

// ── Reset ALL (including settings) ───────────────────────────
function resetAll() {
  // Clear inputs
  ['glucose', 'carbs'].forEach(id => { document.getElementById(id).value = ''; });
  // Reset settings to defaults
  document.getElementById('icr').value    = DEFAULTS.icr;
  document.getElementById('isf').value    = unit === 'mmol' ? DEFAULTS.isf_mmol    : DEFAULTS.isf_mgdl;
  document.getElementById('target').value = unit === 'mmol' ? DEFAULTS.target_mmol : DEFAULTS.target_mgdl;
  // Clear UI
  document.getElementById('glucose-badge').innerHTML = '';
  document.getElementById('glucose-zone').style.background = 'transparent';
  clearAllErrors();
  hideResult();
}

// ── History ───────────────────────────────────────────────────
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('insulin_history') || '[]'); }
  catch { return []; }
}

function saveHistory(glucose, carbs, dose, time) {
  const h = loadHistory();
  h.unshift({ glucose, carbs, dose, time, unit, date: new Date().toLocaleDateString() });
  if (h.length > 20) h.length = 20;
  localStorage.setItem('insulin_history', JSON.stringify(h));
  renderHistory();
  updateHistoryLabel();
}

function renderHistory() {
  const h    = loadHistory();
  const list = document.getElementById('history-list');
  if (!h.length) {
    list.innerHTML = `<div class="history-empty">${t('history_empty')}</div>`;
    return;
  }
  list.innerHTML = h.map(e => `
    <div class="history-item">
      <div class="history-item-left">
        <div>${e.date} ${e.time}</div>
        <div>🩸 ${e.glucose} ${e.unit === 'mmol' ? 'mmol/L' : 'mg/dL'} &nbsp;🥗 ${e.carbs}g</div>
      </div>
      <div class="history-item-dose">${e.dose > 0 ? e.dose.toFixed(1) + ' u.' : '—'}</div>
    </div>`).join('');
}

function clearHistory() {
  if (!confirm(t('confirm_history'))) return;
  localStorage.removeItem('insulin_history');
  renderHistory();
  updateHistoryLabel();
}

function updateHistoryLabel() {
  const h   = loadHistory();
  const lbl = document.getElementById('history-toggle-label');
  if (lbl) lbl.textContent = h.length ? `${t('btn_history')} (${h.length})` : t('btn_history');
}

let historyOpen = false;
function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('history-panel').classList.toggle('visible', historyOpen);
  if (historyOpen) {
    renderHistory();
    setTimeout(() => document.getElementById('history-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  }
}

// ── React to language changes ─────────────────────────────────
document.addEventListener('langchange', () => {
  updateHistoryLabel();
  // Re-apply unit labels
  document.getElementById('glucose-unit-label').textContent = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  document.getElementById('target-unit-label').textContent  = t(unit === 'mmol' ? 'unit_mmol' : 'unit_mgdl');
  document.getElementById('glucose').placeholder  = t(unit === 'mmol' ? 'ph_glucose_mmol' : 'ph_glucose_mgdl');
  document.getElementById('isf').placeholder      = t(unit === 'mmol' ? 'ph_isf_mmol'    : 'ph_isf_mgdl');
  document.getElementById('target').placeholder   = t(unit === 'mmol' ? 'ph_target_mmol' : 'ph_target_mgdl');
});

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateHistoryLabel();
  // Set correct placeholder
  document.getElementById('glucose').placeholder  = t('ph_glucose_mmol');
  document.getElementById('isf').placeholder      = t('ph_isf_mmol');
  document.getElementById('target').placeholder   = t('ph_target_mmol');
  document.getElementById('carbs').placeholder    = t('ph_carbs');
  // Target default value
  document.getElementById('target').value = DEFAULTS.target_mmol;
});
</script>
